<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="app-header">
  <a class="brand" routerLink="/incidents" aria-label="InfraFlow home">
    <span class="brand__mark" aria-hidden="true">IF</span>
    <span>
      <strong>InfraFlow</strong>
      <small>Critical operations</small>
    </span>
  </a>

  <nav aria-label="Primary navigation">
    <a routerLink="/incidents" routerLinkActive="active">Incidents</a>
    <a routerLink="/assets" routerLinkActive="active">Assets</a>
    <a routerLink="/work-orders" routerLinkActive="active">Work orders</a>

}

<main id="main-content" class="app-content">
  <router-outlet />
</main>

<footer class="app-footer">
  <span>Training environment</span>
  <span>Angular 22 · Phase 1 complete</span>
</footer>
