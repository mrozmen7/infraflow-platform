<form class="filter-bar" [attr.aria-label]="'incidents.filters.aria' | translate" (submit)="$event.preventDefault()">
  <label class="filter-bar__field filter-bar__field--search">
    <span>{{ 'incidents.filters.searchLabel' | translate }}</span>
    <input
      #searchInput
      type="search"
      name="incident-search"
      autocomplete="off"
      [placeholder]="'incidents.filters.searchPlaceholder' | translate"
      [value]="searchTerm()"
      (input)="onSearchInput($event)"
    />
  </label>

  <label class="filter-bar__field">
    <span>{{ 'incidents.filters.severityLabel' | translate }}</span>
    <select name="incident-severity" [value]="severity()" (change)="onSeverityChange($event)">
      @for (severityOption of severityOptions; track severityOption) {
        <option [value]="severityOption">
          {{ severityOption === 'All' ? ('incidents.filters.allSeverities' | translate) : severityOption }}
        </option>
      }
    </select>
  </label>

  <button type="button" (click)="resetRequested.emit()">{{ 'incidents.filters.reset' | translate }}</button>
</form>
