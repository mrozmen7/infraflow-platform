<div class="incident-list__columns" aria-hidden="true">
  <span>{{ 'incidents.list.incident' | translate }}</span>
  <span>{{ 'incidents.list.classification' | translate }}</span>
  <span>{{ 'incidents.list.status' | translate }}</span>
  <span>{{ 'incidents.list.action' | translate }}</span>
</div>

<ol class="incident-list" [attr.aria-label]="'incidents.queue.resultsAria' | translate">
  @for (incident of incidents(); track incident.id) {
    <li>
      <app-incident-card
        [incident]="incident"
        [selected]="selectedIncidentId() === incident.id"
        [acknowledgementPending]="pendingAcknowledgementId() === incident.id"
        (acknowledgeRequested)="acknowledgeRequested.emit($event)"
        (selectRequested)="selectRequested.emit($event)"
      />
    </li>
  }
</ol>
