<main class="login-page" aria-labelledby="login-title">
  <section class="login-card">
    <p class="login-card__eyebrow">InfraFlow operations console</p>
    <h1 id="login-title">Sign in to the operational workspace</h1>
    <p class="login-card__summary">
      Your role controls which incident workflows you may perform. Critical actions remain
      authorized by the backend.
    </p>

    <form (submit)="$event.preventDefault(); submit()">
      <label>
        <span>Username</span>
        <input
          #usernameInput
          type="text"
          autocomplete="username"
          [value]="username()"
          (input)="username.set(usernameInput.value)"
          required
        />
      </label>

      <label>
        <span>Password</span>
        <input
          #passwordInput
          type="password"
          autocomplete="current-password"
          [value]="password()"
          (input)="password.set(passwordInput.value)"
          required
        />
      </label>

      @if (errorMessage(); as errorMessage) {
        <p class="login-card__error" role="alert">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="isSubmitting() || !canSubmit()">
        {{ isSubmitting() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>
