<main class="login-page" aria-labelledby="login-title">
  <section class="login-card">
    <p class="login-card__eyebrow">{{ 'login.eyebrow' | translate }}</p>
    <h1 id="login-title">{{ 'login.title' | translate }}</h1>
    <p class="login-card__summary">
      {{ 'login.summary' | translate }}
    </p>

    <form (submit)="$event.preventDefault(); submit()">
      <label>
        <span>{{ 'login.username' | translate }}</span>
        <input
          #usernameInput
          type="text"
          autocomplete="username"
          [value]="username()"
          (input)="username.set(usernameInput.value)"
          required
        />
      </label>

      <label>
        <span>{{ 'login.password' | translate }}</span>
        <input
          #passwordInput
          type="password"
          autocomplete="current-password"
          [value]="password()"
          (input)="password.set(passwordInput.value)"
          required
        />
      </label>

      @if (errorMessage(); as errorMessage) {
        <p class="login-card__error" role="alert">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="isSubmitting() || !canSubmit()">
        {{ (isSubmitting() ? 'login.submitting' : 'login.submit') | translate }}
      </button>
    </form>
  </section>
</main>
