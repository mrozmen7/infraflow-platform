name: Deploy InfraFlow demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-demo.yml'
      - '.nvmrc'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Install locked frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build the static mock demo
        working-directory: frontend
        run: npm run build:pages-demo
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist/infraflow-web/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
