global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # The backend runs on the host (mvn spring-boot:run) and exposes
  # /actuator/prometheus without authentication, like /actuator/health.
  - job_name: infraflow-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: infraflow-backend
