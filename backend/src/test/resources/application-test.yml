spring:
  datasource:
    url: jdbc:h2:mem:infraflow-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    clean-disabled: false

infraflow:
  security:
    jwt:
      # Test-only fixed value, never used outside the test suite.
      secret: infraflow-test-only-secret-with-at-least-256-bits
