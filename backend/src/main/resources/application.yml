spring:
  application:
    name: infraflow-backend
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        # Publishes histogram buckets so Prometheus can compute latency percentiles.
        http.server.requests: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  # Pin JSON as the declared response media type so exported contracts carry
  # application/json instead of */* (client generators key on this).
  default-produces-media-type: application/json

infraflow:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
      # Full-stack compose frontend (nginx on host port 18088).
      - http://localhost:18088
      - http://127.0.0.1:18088
  security:
    # false is only for local HTTP development. Production must set this to true over HTTPS.
    refresh-cookie-secure: false
    jwt:
      issuer: infraflow
      # No default: the application fails fast at startup when JWT_SECRET is missing.
      secret: ${JWT_SECRET}
      access-token-ttl: PT15M
      refresh-token-ttl: PT8H
    users:
      operator:
        password: operator
        roles:
          - OPERATOR
      admin:
        password: admin
        roles:
          - ADMIN
          - OPERATOR
