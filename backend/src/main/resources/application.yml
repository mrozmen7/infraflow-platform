spring:
  application:
    name: infraflow-backend
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

infraflow:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
  security:
    # false is only for local HTTP development. Production must set this to true over HTTPS.
    refresh-cookie-secure: false
    jwt:
      issuer: infraflow
      # No default: the application fails fast at startup when JWT_SECRET is missing.
      secret: ${JWT_SECRET}
      access-token-ttl: PT15M
      refresh-token-ttl: PT8H
    users:
      operator:
        password: operator
        roles:
          - OPERATOR
      admin:
        password: admin
        roles:
          - ADMIN
          - OPERATOR
